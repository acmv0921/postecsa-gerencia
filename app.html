<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>POSTECSA Gerencia</title>
<style>

body{font-family:Arial,sans-serif;background:#0f2540;color:#fff;padding:16px}
h2{color:#e87c1e;margin-bottom:12px}
.mat{background:#fff;color:#1a3c5e;border-radius:8px;padding:10px 14px;margin-bottom:8px;display:flex;justify-content:space-between;border-left:4px solid #e87c1e}
.mn{font-size:13px;font-weight:700}
.mp{font-size:13px;font-weight:800}
input{width:100%;padding:10px;border-radius:8px;border:none;font-size:13px;margin-bottom:12px}
#count{color:#cdd5e0;font-size:12px;margin-bottom:10px}
</style>
</head>
<body>
<h2>Biblioteca de Materiales</h2>
<input id="q" placeholder="Buscar material..." oninput="filtrar()">
<div id="count"></div>
<div id="lista"></div>

{n:"Correa alternador",u:"Und",p:53000}
];

function fmt(n){return '$'+n.toLocaleString('es-CO');}

function render(lista){
  document.getElementById('count').textContent=lista.length+' materiales';
  document.getElementById('lista').innerHTML=lista.map(function(m){
    return '<div class="mat"><div class="mn">'+m.n+'<br><span style="font-size:10px;color:#5a6478">'+m.u+'</span></div><div class="mp">'+fmt(m.p)+'</div></div>';
  }).join('');
}

function filtrar(){
  var q=document.getElementById('q').value.toLowerCase();
  render(q?MATS.filter(function(m){return m.n.toLowerCase().indexOf(q)!==-1;}):MATS);
}

render(MATS);
</script>
</body>
</html>
